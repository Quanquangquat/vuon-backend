# =============================================
# PROFILE H2 - Chạy không cần cài MySQL
# Lệnh: mvn spring-boot:run -Dspring-boot.run.profiles=h2
# =============================================

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:vuondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA - H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

# Tắt email, dùng console log OTP thay thế
app.email.enabled=false

# CORS - mở rộng cho dev
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,http://localhost:8080

# Override JWT secret cho dev
jwt.secret=dev_secret_key_h2_profile_vuon_app_at_least_32chars_ok
