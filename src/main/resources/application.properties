# =============================================
# VƯƠN Backend - Spring Boot Configuration
# Railway sẽ inject các biến môi trường (env vars)
# Dev local: giá trị sau dấu : là fallback mặc định
# =============================================

# Server - Railway dùng biến PORT
server.port=${PORT:5000}

# =============================================
# PostgreSQL Database (Supabase)
# Railway Variables cần set: SUPABASE_DB_PASSWORD
# Dev local: mvn spring-boot:run -Dspring-boot.run.profiles=h2
# =============================================
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.wzfyflkpsyltomuokjjl
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT - Đặt JWT_SECRET trong Railway Variables
# =============================================
jwt.secret=${JWT_SECRET:vuon_super_secret_key_2025_change_this_in_production_at_least_32chars}
jwt.expiration=604800000

# =============================================
# Email (tắt nếu không cấu hình Gmail SMTP)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.enabled=${EMAIL_ENABLED:false}

# =============================================
# File Upload
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# =============================================
# CORS - Đặt CORS_ORIGINS trong Railway Variables
# Bao gồm: GitHub Pages URL, Railway URL, localhost dev
# =============================================
app.cors.allowed-origins=${CORS_ORIGINS:https://vuon.io.vn,https://www.vuon.io.vn,http://vuon.io.vn,https://quanquangquat.github.io,http://localhost:5173,http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,http://localhost:8080}

# =============================================
# AI API Keys
# =============================================
app.ai.gemini-key=${GEMINI_KEY:AIzaSyDgaE_qofgrYOPNhPo6wtPSU-GXSXczne4}
app.ai.plant-id-key=${PLANT_ID_KEY:}
app.ai.openweather-key=${OPENWEATHER_KEY:}

# =============================================
# Logging
# =============================================
logging.level.com.vuon=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
